# Example: mariadb-operator Backup CRD targeting the S3 gateway
# The accessKeyId and secretAccessKey are PBS credentials that the
# gateway translates into PBS API tokens via the credentials file.
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-s3-creds
type: Opaque
stringData:
  accessKeyId: "root@pam!s3gateway"
  secretAccessKey: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Backup
metadata:
  name: mariadb-backup
spec:
  mariaDbRef:
    name: mariadb
  s3:
    bucket: team-a
    prefix: mariadb/
    endpoint: http://pbs-s3gateway:80
    accessKeyIdSecret:
      name: mariadb-s3-creds
      key: accessKeyId
    secretAccessKeySecret:
      name: mariadb-s3-creds
      key: secretAccessKey
