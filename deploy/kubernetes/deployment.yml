apiVersion: v1
kind: Secret
metadata:
  name: pbs-s3gateway
type: Opaque
stringData:
  pbs-url: "https://pbs.example.com:8007"
  pbs-datastore: "backup-store"
  pbs-token: ""  # optional when using credentials file
  encryption-key: ""
  # Credentials file content (JSON: accessKeyId → secretAccessKey)
  credentials: |
    {
      "root@pam!s3gateway": "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pbs-s3gateway
  labels:
    app: pbs-s3gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pbs-s3gateway
  template:
    metadata:
      labels:
        app: pbs-s3gateway
    spec:
      containers:
        - name: pbs-s3gateway
          image: ghcr.io/pbs-plus/pbs-s3gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: PBS_URL
              valueFrom:
                secretKeyRef:
                  name: pbs-s3gateway
                  key: pbs-url
            - name: PBS_DATASTORE
              valueFrom:
                secretKeyRef:
                  name: pbs-s3gateway
                  key: pbs-datastore
            - name: PBS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pbs-s3gateway
                  key: pbs-token
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: pbs-s3gateway
                  key: encryption-key
          args: ["--credentials", "/etc/credentials/credentials.json"]
          volumeMounts:
            - name: credentials
              mountPath: /etc/credentials
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 5
      volumes:
        - name: credentials
          secret:
            secretName: pbs-s3gateway
            items:
              - key: credentials
                path: credentials.json
---
apiVersion: v1
kind: Service
metadata:
  name: pbs-s3gateway
spec:
  selector:
    app: pbs-s3gateway
  ports:
    - port: 80
      targetPort: 8080
