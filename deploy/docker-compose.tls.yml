# Example: behind a TLS-terminating reverse proxy (nginx/caddy)
services:
  s3gateway:
    image: ghcr.io/pbs-plus/pbs-s3gateway:latest
    environment:
      PBS_URL: https://pbs:8007
      PBS_DATASTORE: backup-store
      PBS_TOKEN: ${PBS_TOKEN}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    restart: unless-stopped
    networks:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - s3gateway
    networks:
      - backend

networks:
  backend:
