version: 2

builds:
  - main: ./cmd/pbs-s3gateway
    binary: pbs-s3gateway
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

dockers:
  - image_templates:
      - ghcr.io/pbs-plus/pbs-s3gateway:{{.Version}}-amd64
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.title=pbs-s3gateway
      - --label=org.opencontainers.image.version={{.Version}}
      - --label=org.opencontainers.image.revision={{.Commit}}
      - --label=org.opencontainers.image.source={{.GitURL}}

  - image_templates:
      - ghcr.io/pbs-plus/pbs-s3gateway:{{.Version}}-arm64
    dockerfile: Dockerfile
    use: buildx
    goarch: arm64
    build_flag_templates:
      - --platform=linux/arm64
      - --label=org.opencontainers.image.title=pbs-s3gateway
      - --label=org.opencontainers.image.version={{.Version}}
      - --label=org.opencontainers.image.revision={{.Commit}}
      - --label=org.opencontainers.image.source={{.GitURL}}

docker_manifests:
  - name_template: ghcr.io/pbs-plus/pbs-s3gateway:{{.Version}}
    image_templates:
      - ghcr.io/pbs-plus/pbs-s3gateway:{{.Version}}-amd64
      - ghcr.io/pbs-plus/pbs-s3gateway:{{.Version}}-arm64

  - name_template: ghcr.io/pbs-plus/pbs-s3gateway:latest
    image_templates:
      - ghcr.io/pbs-plus/pbs-s3gateway:{{.Version}}-amd64
      - ghcr.io/pbs-plus/pbs-s3gateway:{{.Version}}-arm64

archives:
  - format: binary
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

release:
  footer: >
    ---

    **Docker image:** `ghcr.io/pbs-plus/pbs-s3gateway:{{.Version}}`

    ```bash
    docker pull ghcr.io/pbs-plus/pbs-s3gateway:{{.Version}}
    ```
